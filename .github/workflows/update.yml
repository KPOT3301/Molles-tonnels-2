name: Daily auto update

on:
  schedule:
    - cron: '0 21 * * *'   # 00:00 МСК (UTC+3)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests requests[socks]

      # ✅ Скачиваем Xray правильно
      - name: Download Xray
        run: |
          wget -O xray.zip https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          unzip -o xray.zip
          chmod +x xray

      - name: Run generator
        run: python GENERATOR.py

      - name: Commit and push if changed
        run: |
          git config --global user.name "actions-user"
          git config --global user.email "actions@github.com"

          git add Molestunnels.txt Molestunnels_base64.txt

          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Daily auto update (00:00 MSK)"
            git push
          fi
