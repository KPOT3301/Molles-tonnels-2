name: Update VLESS Subscription

on:
  workflow_dispatch:
  schedule:
    # 19:00 UTC = 00:00 Екатеринбург (UTC+5)
    - cron: '0 19 * * 0,2,4'  # Пн Ср Пт 00:00 Екатеринбург

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ✅ Установка Python зависимостей
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install aiohttp requests[socks]

      # ✅ Установка Xray ДО запуска генератора
      - name: Install Xray
        run: |
          wget -q https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          unzip -o Xray-linux-64.zip
          chmod +x xray

      # ✅ Запуск генератора
      - name: Run generator
        run: python generate.py

      # ✅ Коммит если файл изменился
      - name: Commit and push if changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Molestunnels.txt
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto update VLESS list"
          git push
