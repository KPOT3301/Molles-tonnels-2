name: Generator

on:
  workflow_dispatch:
  schedule:
    - cron: "0 21 * * *"   # 00:00 Москва (UTC+3)

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install aiohttp

      - name: Ensure required files exist
        run: |
          if [ ! -f servers.txt ]; then
            echo "servers.txt not found, creating empty file"
            touch servers.txt
          fi

          if [ ! -f best_cache.json ]; then
            echo '{"servers": []}' > best_cache.json
          fi

      - name: Run Generator
        run: python GENERATOR.py

      - name: Commit updated cache and results
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add best_cache.json TOP100.txt
          git commit -m "Auto update results $(date -u)" || echo "No changes"
          git push
