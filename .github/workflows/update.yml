name: Update Molles Tunnels

on:
  schedule:
    - cron: "0 21 * * *"   # Каждый день в 00:00 МСК (21:00 UTC)
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install aiohttp

      - name: Run generator
        run: python GENERATOR.py

      - name: Commit and push if changed
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add Molestunnels.txt Molestunnels_base64.txt
          git commit -m "Daily auto update (00:00 MSK)" || exit 0
          git push
