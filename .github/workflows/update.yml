name: Update Molles Tunnels

on:
  workflow_dispatch:
  schedule:
    - cron: '0 19 * * 1,3,5'   # 00:00 Екатеринбург (UTC+5)

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run generator
        run: python ГЕНЕРАТОР.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add Molestunnels.txt Molestunnels_base64.txt
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto update tunnels"
          git push
