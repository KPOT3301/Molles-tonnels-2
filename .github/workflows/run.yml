name: Check Vless Servers

on:
  schedule:
    - cron: '0 */6 * * *'   # каждые 6 часов (можно настроить)
  workflow_dispatch:         # возможность запуска вручную

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Download Xray-core
        run: |
          wget https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          unzip Xray-linux-64.zip -d xray-core
          chmod +x xray-core/xray
          echo "$(pwd)/xray-core" >> $GITHUB_PATH   # добавляем в PATH

      - name: Run GENERATOR.py
        run: python GENERATOR.py

      - name: Commit and push if subscription.txt changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add subscription.txt
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update subscription.txt"
          git push
