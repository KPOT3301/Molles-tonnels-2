name: Check Vless Servers

on:
  schedule:
    - cron: '0 */6 * * *'   # каждые 6 часов
  workflow_dispatch:          # ручной запуск

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests python-v2ray

      - name: Run GENERATOR.py
        run: python GENERATOR.py

      - name: Commit and push if subscription.txt changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add subscription.txt
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update subscription.txt"
          git push
