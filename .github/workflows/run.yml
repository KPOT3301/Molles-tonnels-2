name: Check Vless Servers

on:
  schedule:
    - cron: '0 21 * * *'   # 21:00 UTC = 00:00 MSK (следующего дня)
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install geoip2   # на случай, если в requirements.txt нет

      - name: Download Xray-core
        run: |
          wget -q https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          unzip -q Xray-linux-64.zip -d xray-core
          chmod +x xray-core/xray
          echo "$(pwd)/xray-core" >> $GITHUB_PATH

      - name: Verify Xray installation
        run: xray --version

      - name: Run GENERATOR.py
        run: python GENERATOR.py

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add subscription.txt subscription_base64.txt
          if ! git diff --quiet && git diff --staged --quiet; then
            git commit -m "Auto-update subscription files"
            git push
          else
            echo "No changes to commit"
          fi
