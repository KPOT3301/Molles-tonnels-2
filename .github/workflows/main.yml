name: Update VPN Subscription

on:
  schedule:
    # Запуск в 21:00 UTC (00:00 по МСК)
    - cron: '0 21 * * *'
  workflow_dispatch: # Позволяет запускать вручную

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run script
        # ВАЖНО: Запускаем именно GENERATOR.py
        run: python GENERATOR.py

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add subscription.txt links_plain.txt
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Daily update MSK $(date -d '+3 hours' +'%d-%m-%Y')"
            git push
          fi

      - name: Create or Update Release
        if: success()
        uses: softprops/action-gh-release@v1
        with:
          files: |
            subscription.txt
            links_plain.txt
          tag_name: latest
          name: "🇷🇺 КРОТовыеТОННЕЛИ 🇷🇺"
          body: |
            📅 Обновлено (МСК): $(date -d '+3 hours' +'%d-%m-%Y %H:%M')
            🚀 Самые быстрые 10% серверов помечены ракетами.
            🛰 Всего рабочих узлов: $(grep -c "://" subscription.txt || echo "0")
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
