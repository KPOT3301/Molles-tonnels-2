name: Update VPN Subscription

on:
  schedule:
    # Запуск в 21:00 UTC (00:00 по МСК)
    - cron: '0 21 * * *'
  workflow_dispatch: # Кнопка ручного запуска в Actions

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run script
        run: python main.py

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add subscription.txt links_plain.txt
          
          # Проверка на наличие изменений
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            CURRENT_DATE=$(date -d '+3 hours' +'%d-%m-%Y')
            git commit -m "Daily update MSK $CURRENT_DATE"
            git push
          fi

      - name: Create or Update Release
        if: success()
        uses: softprops/action-gh-release@v1
        with:
          files: |
            subscription.txt
            links_plain.txt
          tag_name: latest
          name: "🇷🇺 КРОТовыеТОННЕЛИ 🇷🇺"
          body: |
            📅 Последнее обновление (МСК): $(date -d '+3 hours' +'%d-%m-%Y %H:%M')
            🚀 Все серверы проверены на доступность YouTube.
            ⚡ Самые быстрые 10% помечены ракетами.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
