name: Speed Filter Update

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-nodes:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Generator Script
        run: |
          # Проверяем, существует ли файл, чтобы не гадать по ошибкам
          if [ -f "GENERATOR.py" ]; then
            python GENERATOR.py
          else
            echo "❌ Ошибка: Файл GENERATOR.py не найден в корне репозитория!"
            ls -R
            exit 1
          fi

      - name: Commit and Push Changes
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add subscription.txt links_plain.txt
          # Коммитим только если файлы изменились
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update nodes: $(date +'%d-%m-%Y %H:%M')" && git push origin main)
