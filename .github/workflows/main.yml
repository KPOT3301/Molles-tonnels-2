name: Update VPN Subscription

on:
  schedule:
    - cron: '0 */6 * * *' # Запуск каждые 6 часов
  workflow_dispatch: # Возможность ручного запуска

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run script
        run: python main.py

      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          # Добавляем файл, если он был создан
          if [ -f subscription.txt ]; then
            git add subscription.txt
            # Коммитим только если есть реальные изменения в файле
            git diff --quiet && git diff --staged --quiet || git commit -m "Update subscription $(date +'%d-%m-%Y')"
            git push
          else
            echo "Файл subscription.txt не найден, пропускаем коммит."
          fi

      - name: Release Latest
        uses: softprops/action-gh-release@v1
        if: success()
        with:
          files: subscription.txt
          tag_name: latest
          name: "VPN Subscription Updated"
          body: "Последнее обновление: $(date +'%d-%m-%Y %H:%M')"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
