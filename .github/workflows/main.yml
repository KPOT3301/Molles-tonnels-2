name: Update VPN Subscription

on:
  schedule:
    # 21:00 UTC = 00:00 MSK (один раз в сутки)
    - cron: '0 21 * * *'
  workflow_dispatch: # Позволяет запускать вручную кнопкой в любое время

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run script
        run: python main.py

      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add subscription.txt links_plain.txt
          # Проверяем изменения, чтобы избежать пустых коммитов
          git diff --quiet && git diff --staged --quiet || (git commit -m "Daily update MSK $(date -d '+3 hours' +'%d-%m-%Y')" && git push)

      - name: Release Latest
        if: success()
        uses: softprops/action-gh-release@v1
        with:
          files: |
            subscription.txt
            links_plain.txt
          tag_name: latest
          name: "VPN Subscription Updated"
          body: "Обновлено (МСК): $(date -d '+3 hours' +'%d-%m-%Y %H:%M')"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
