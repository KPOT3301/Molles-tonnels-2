name: Update VPN Subscription

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run script
        run: python main.py

      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          if [ -f subscription.txt ]; then
            git add subscription.txt
            git diff --quiet && git diff --staged --quiet || git commit -m "Update $(date +'%d-%m-%Y')"
            git push
          fi

      - name: Release Latest
        if: success() && hashFiles('subscription.txt') != ''
        uses: softprops/action-gh-release@v1
        with:
          files: subscription.txt
          tag_name: latest
          name: "VPN Subscription Updated"
          body: "Обновлено: $(date +'%d-%m-%Y %H:%M')"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
